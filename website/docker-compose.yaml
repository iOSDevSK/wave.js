services:
  frontend:
    build:
      context: ..
      dockerfile: website/Dockerfile
    expose:
      - "80"
    networks:
      - coolify
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    labels:
      - traefik.enable=true
      - traefik.docker.network=coolify

networks:
  coolify:
    external: true
